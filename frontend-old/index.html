<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Workflow Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Markdown styles */
        .markdown-body { line-height: 1.6; }
        .markdown-body p { margin-bottom: 1em; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body ul { list-style-type: disc; margin-left: 1.5em; margin-bottom: 1em; }
        .markdown-body ol { list-style-type: decimal; margin-left: 1.5em; margin-bottom: 1em; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { font-weight: 600; margin-top: 1.5em; margin-bottom: 0.5em; }
        .markdown-body h3 { font-size: 1.1em; }
        .markdown-body pre { background-color: #f1f5f9; padding: 1em; border-radius: 0.5em; overflow-x: auto; margin-bottom: 1em; font-size: 0.9em; }
        .markdown-body code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; background-color: #f1f5f9; padding: 0.2em 0.4em; border-radius: 0.3em; font-size: 0.9em; }
        .markdown-body pre code { background-color: transparent; padding: 0; font-size: 1em; }
        .markdown-body blockquote { border-left: 4px solid #cbd5e1; padding-left: 1em; color: #64748b; margin-bottom: 1em; }
        .markdown-body strong { font-weight: 600; color: #1e293b; }
        
        /* Typing animation */
        .typing-indicator { display: flex; gap: 4px; padding: 0.5rem 0; }
        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #94a3b8;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        #chat-container { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans overflow-hidden">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-gray-200 py-3 px-6 flex items-center justify-between z-10 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-md">
                <i class="fa-solid fa-robot text-xl"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold text-gray-800 leading-tight">Agent Workflow</h1>
                <p class="text-xs text-gray-500">Multi-Agent Collaborative System</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <span class="flex h-3 w-3 relative">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
            </span>
            <span class="text-sm text-gray-600 font-medium">System Online</span>
        </div>
    </header>

    <!-- Chat Area -->
    <main id="chat-container" class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6">
        <!-- Welcome Message -->
        <div class="flex gap-4 max-w-4xl mx-auto w-full">
            <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 flex-shrink-0 mt-1 shadow-sm">
                <i class="fa-solid fa-robot text-sm"></i>
            </div>
            <div class="bg-white p-4 rounded-2xl rounded-tl-none shadow-sm border border-gray-100 text-gray-800 markdown-body max-w-[85%]">
                <p>你好！👋 我是基于 <strong>Agent Workflow</strong> 的多智能体协作系统助手。</p>
                <p>我可以调动背后的多个专家 Agent（如检索研究员、内容总结员等）协同为您工作。请输入您的问题，我们将为您提供详尽的解答与总结。</p>
            </div>
        </div>
    </main>

    <!-- Input Area -->
    <footer class="bg-white border-t border-gray-200 p-4 pb-6 shrink-0 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <div class="max-w-4xl mx-auto relative flex items-end gap-3">
            <div class="flex-1 relative bg-gray-50 border border-gray-300 rounded-2xl shadow-inner focus-within:ring-2 focus-within:ring-blue-500/50 focus-within:border-blue-500 transition-all overflow-hidden flex items-center">
                <textarea id="message-input" rows="1" 
                    class="w-full max-h-32 py-3 px-4 bg-transparent border-none focus:ring-0 resize-none outline-none text-gray-800 text-base"
                    placeholder="输入您的问题 (按 Enter 发送，Shift+Enter 换行)..."></textarea>
            </div>
            <button id="send-btn" class="w-12 h-12 rounded-full bg-blue-600 hover:bg-blue-700 text-white flex items-center justify-center shadow-md transition-all disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:bg-blue-600 disabled:shadow-none flex-shrink-0 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                <i class="fa-solid fa-paper-plane ml-[-2px]"></i>
            </button>
        </div>
        <div class="max-w-4xl mx-auto mt-3 text-center">
            <p class="text-xs text-gray-400 flex items-center justify-center gap-1">
                <i class="fa-solid fa-shield-halved"></i> AI 生成内容仅供参考，请注意甄别信息准确性。
            </p>
        </div>
    </footer>

    <script src="/static/app.js"></script>
</body>
</html>
